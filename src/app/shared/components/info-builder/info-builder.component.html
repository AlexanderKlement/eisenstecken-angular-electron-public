<h4>Information</h4>
@if (dataSource.data$ | async; as data) {
  <div fxLayout="row wrap">
    @for (info of dataSource.mapping; track info; let i = $index) {
      <div fxFlex="25">
        <mat-form-field class="readonly">
          <mat-label> {{ info.name }}</mat-label>
          @if (info.textarea) {
            <textarea matInput readonly>{{ getPropertyOfObject(data, info.property) }}</textarea>
          } @else {
            <input matInput value="{{ getPropertyOfObject(data, info.property)}}" readonly>
          }
        </mat-form-field>
      </div>
    }
  </div>
}
