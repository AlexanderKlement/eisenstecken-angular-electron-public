<h1 mat-dialog-title="">{{ title }}</h1>
<div mat-dialog-content="">
  <form [formGroup]="changePathFormGroup">
    <div class="flex flex-col justify-around items-center flex-row">
      <mat-form-field appearance="fill">
        <mat-label>Pfad</mat-label>
        <input matInput="" formControlName="path" />
      </mat-form-field>
      <button type="button" mat-button="" (click)="selectPathClicked()">
        Öffnen
      </button>
    </div>
  </form>
</div>
<div mat-dialog-actions="">
  <button mat-button="" type="button" (click)="onCancelClick()">
    Abbrechen
  </button>
  <button mat-button="" type="button" (click)="onSubmitClick()">
    Speichern
  </button>
</div>
